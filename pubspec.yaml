name: uiren
description: "Bizben birge UIREN."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
    
  cupertino_icons: ^1.0.2

  # * Project Utilities
  # Localization
  flutter_localizations:
    sdk: flutter
  # Flavoring
  flutter_flavorizr: ^2.2.3
  # Icon Generator
  flutter_launcher_icons: ^0.14.3
  flutter_super_html_viewer: ^0.1.0
  webview_flutter: ^4.9.0
  file: ^7.0.0

  # * Navigation and routing
  # Main Application Router
  go_router: ^14.1.2
  # URL Launcher
  url_launcher: ^6.2.6

  # * Functional programming
  # Either
  fpdart: ^1.1.0

  # * Network and API
  # Http client
  dio: ^5.4.3+1
  # Internet Connection Checker
  internet_connection_checker: ^1.0.0+1
  # Connectivity Checker
  # Check Internet connection
  check_vpn_connection: ^0.0.2
  # Ping to server
  dart_ping: ^9.0.1
  # Map


  # * Development Utilities
  # Logging
  l: ^4.0.2
  # Crash Reporting
  sentry: ^8.2.0
  sentry_flutter: ^8.2.0
  # * Data Management
  path_provider: ^2.1.3
  path: ^1.8.3

  # * State Management
  # BLoC pattern
  flutter_bloc: ^8.1.5
  # Package that exposes custom event transformers
  bloc_concurrency: ^0.2.5
  # Reactive Programming
  rxdart: ^0.28.0

  # * Dependency Injection
  # Dependency Injection
  injectable: ^2.4.2
  # Service Locator
  get_it: ^8.0.0

  # * File and Path Management
  # File Picker
  file_picker: ^8.0.3
  # Image Manipulation
  image: ^4.1.7

  # * General Utilities
  # Object Comparison
  equatable: ^2.0.5
  # UUID Generator
  uuid: ^4.4.0

  # Svg Images
  flutter_svg: ^2.0.10+1
  # pull_to_refresh: ^2.0.0
  # Isolate manager
  # worker_manager: ^7.0.2
  # Asynchronous computations
  async: ^2.11.0
  # Scroll Controller Group
  sync_scroll_controller: ^1.0.1
  # Flutter Icon Generator
  icons_launcher: ^3.0.0
  # Shimmer loading effect
  shimmer: ^3.0.0
  gap: ^3.0.1
  hive_flutter: ^1.1.0
  freezed: ^2.5.2
  custom_refresh_indicator: ^4.0.1
  json_annotation: ^4.9.0
  maplibre_gl: ^0.20.0
  geocoding: ^3.0.0
  http: ^1.2.1
  share_plus: ^10.0.0
  package_info_plus: ^8.0.0
  flutter_plugin_android_lifecycle: 2.0.24

  #firebase settings
  firebase_core: ^3.13.0
  firebase_messaging: ^15.1.3

  # Native Splash Screen
  flutter_native_splash: ^2.4.1
  cached_network_image: ^3.4.1
  flutter_widget_from_html: ^0.15.2
  talker: 4.4.1
  talker_flutter: 4.4.1
  talker_dio_logger: 4.4.1
  talker_bloc_logger: 4.4.1
  talker_logger: 4.4.1
  permission_handler: ^11.4.0
  open_file: ^3.5.10
  downloadsfolder: ^1.1.1
  nested: ^1.0.0
  # Code Generation for Models and Union Types
  freezed_annotation: ^2.4.4
  fixnum: ^1.1.1
  stack_trace: ^1.11.1
  amplitude_flutter: ^4.1.0
  carousel_slider: ^5.0.0
  youtube_player_flutter: ^9.1.1
  flutter_secure_storage: ^9.2.4
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  image_picker: ^1.1.2
  search_page: ^2.3.0
  android_intent_plus: ^5.3.0
  table_calendar: ^3.1.3
  easy_localization: ^3.0.8
  fl_chart: ^1.2.0

#  ++++++++++++++++++++++++++++++
flutter_native_splash:
  android: true
  ios: true
  color: 'ffffff'
  color_dark: 'ffffff'
  fullscreen: true
  android_12:
    icon_background_color: '#ffffff'
    icon_background_color_dark: '#ffffff'
    icon_background_color_android_13: '#ffffff'
    icon_background_color_dark_android_13: '#ffffff'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # * Code Generators
  # Generating Files
  build_runner: ^2.4.10
  # Generating Serialization of JSON
  json_serializable: ^6.8.0
  # Generating Asset Files
  flutter_gen_runner: ^5.5.0+1
  # Injecting Dependencies
  injectable_generator: ^2.6.1
  # FFI gen
  ffigen: ^14.0.1
  rename_app: ^1.6.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/data/university_data.json

  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Bold.ttf
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf
        - asset: assets/fonts/Manrope-Bold.ttf
        - asset: assets/fonts/Manrope-Medium.ttf
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-SemiBold.ttf



flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
